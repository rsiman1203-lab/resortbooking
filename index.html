<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌴 Resort Booking Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%); min-height: 100vh; color: #f0ede8; }
    input, select, button { font-family: Georgia, serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    optgroup, option { background: #1a2f3a; color: #f0ede8; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const UNITS = [
  { id:"c1", label:"Cottage 1", type:"cottage" },
  { id:"c2", label:"Cottage 2", type:"cottage" },
  { id:"c3", label:"Cottage 3", type:"cottage" },
  { id:"c4", label:"Cottage 4", type:"cottage" },
  { id:"c5", label:"Cottage 5", type:"cottage" },
  { id:"c6", label:"Cottage 6", type:"cottage" },
  { id:"r1", label:"Room 1",    type:"room" },
  { id:"r2", label:"Room 2",    type:"room" },
  { id:"r3", label:"Room 3",    type:"room" },
];
const ALL_UNIT_IDS = UNITS.map(u => u.id);

const ACCOM_TYPES = {
  dayTour:   { label:"Day Tour",  icon:"☀️", timeIn:"8:00 AM", timeOut:"5:00 PM",            color:"#fbbf24" },
  overnight: { label:"Overnight", icon:"🌙", timeIn:"7:00 PM", timeOut:"6:00 AM (next day)", color:"#818cf8" },
};
const STATUS_COLORS = {
  confirmed: { bg:"#d1fae5", text:"#065f46", dot:"#10b981" },
  pending:   { bg:"#fef3c7", text:"#92400e", dot:"#f59e0b" },
  cancelled: { bg:"#fee2e2", text:"#991b1b", dot:"#ef4444" },
};

const today = new Date().toISOString().split("T")[0];
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x.toISOString().split("T")[0]; }
function formatDate(d){ if(!d)return""; return new Date(d+"T00:00:00").toLocaleDateString("en-PH",{month:"short",day:"numeric",year:"numeric"}); }
function getPairedId(b,all){
  const ot=b.accomType==="dayTour"?"overnight":"dayTour";
  const p=all.find(x=>x.id!==b.id&&x.guestName===b.guestName&&x.date===b.date&&x.accomType===ot&&JSON.stringify([...x.units].sort())===JSON.stringify([...b.units].sort()));
  return p?p.id:null;
}

// Local storage helpers
function loadBookings() {
  try { const s = localStorage.getItem("resort_bookings"); return s ? JSON.parse(s) : []; } catch { return []; }
}
function saveBookingsLocal(bs) {
  try { localStorage.setItem("resort_bookings", JSON.stringify(bs)); } catch {}
}

// CSV Export
function exportCSV(bookings) {
  const UNIT_MAP = {c1:"Cottage 1",c2:"Cottage 2",c3:"Cottage 3",c4:"Cottage 4",c5:"Cottage 5",c6:"Cottage 6",r1:"Room 1",r2:"Room 2",r3:"Room 3"};
  const headers = ["ID","Guest Name","Contact","Address","Date","Accommodation","Units","Exclusive","No. of Guests","Status","Notes","Created At"];
  const rows = bookings.map(b => [
    b.id || "",
    b.guestName || "",
    b.contact || "",
    b.address || "",
    b.date || "",
    b.accomType === "dayTour" ? "Day Tour (8AM-5PM)" : "Overnight (7PM-6AM)",
    b.exclusive ? "Entire Resort" : (b.units||[]).map(u=>UNIT_MAP[u]||u).join(" | "),
    b.exclusive ? "YES" : "NO",
    b.pax || 1,
    b.status || "",
    b.notes || "",
    b.createdAt || ""
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("
");
  const blob = new Blob([csv], { type: "text/csv" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `resort-bookings-${new Date().toISOString().split("T")[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function App() {
  const [bookings, setBookingsRaw]      = useState(() => loadBookings());
  const [showForm, setShowForm]         = useState(false);
  const [editBooking, setEditBooking]   = useState(null);
  const [search, setSearch]             = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterType, setFilterType]     = useState("all");
  const [view, setView]                 = useState("list");
  const [toast, setToast]               = useState(null);
  const [nextId, setNextId]             = useState(() => { const bs=loadBookings(); return bs.length ? Math.max(...bs.map(b=>parseInt(b.id)||0))+1 : 1; });

  const emptyForm = { guestName:"", units:["c1"], exclusive:false, date:today, accomType:"dayTour", pax:1, contact:"", address:"", status:"confirmed", notes:"" };
  const [form, setForm] = useState(emptyForm);

  function setBookings(fn) {
    setBookingsRaw(prev => {
      const next = typeof fn === "function" ? fn(prev) : fn;
      saveBookingsLocal(next);
      return next;
    });
  }

  function showToast(msg, type="success") { setToast({msg,type}); setTimeout(()=>setToast(null),3500); }
  function openNew()   { setEditBooking(null); setForm(emptyForm); setShowForm(true); }
  function openEdit(b) { setEditBooking(b.id); setForm({...b, units:[...b.units]}); setShowForm(true); }

  function duplicateAsOther(b) {
    if (getPairedId(b,bookings)) return showToast("A paired booking already exists!","error");
    const ot=b.accomType==="dayTour"?"overnight":"dayTour";
    setEditBooking(null);
    setForm({...b,units:[...b.units],accomType:ot,id:undefined});
    setShowForm(true);
    showToast(`Pre-filled as ${ACCOM_TYPES[ot].label} — review and save ✨`);
  }

  function toggleUnit(uid) {
    if(form.exclusive)return;
    setForm(f=>{ const has=f.units.includes(uid); const next=has?f.units.filter(u=>u!==uid):[...f.units,uid]; return{...f,units:next.length?next:[uid]}; });
  }
  function toggleExclusive() { setForm(f=>({...f,exclusive:!f.exclusive,units:!f.exclusive?ALL_UNIT_IDS:["c1"]})); }

  const tw = { dayTour:[8,17], overnight:[19,30] };
  function overlaps(aT,aD,bT,bD){
    const [as,ae]=tw[aT],[bs,be]=tw[bT];
    const off=(new Date(bD+"T00:00:00")-new Date(aD+"T00:00:00"))/3600000;
    return as<be+off&&ae>bs+off;
  }

  function saveBooking() {
    if(!form.guestName||!form.date||!form.units.length) return showToast("Fill in all required fields","error");
    for(const uid of form.units){
      const conflict=bookings.find(b=>b.id!==editBooking&&b.status!=="cancelled"&&b.units.includes(uid)&&overlaps(form.accomType,form.date,b.accomType,b.date));
      if(conflict){ const uL=UNITS.find(u=>u.id===uid)?.label; return showToast(`⚠️ ${uL} conflicts with ${conflict.guestName} (${ACCOM_TYPES[conflict.accomType].label} on ${formatDate(conflict.date)})`,"error"); }
    }
    if(editBooking){
      setBookings(bs=>bs.map(b=>b.id===editBooking?{...form,id:editBooking}:b));
      showToast("Booking updated!");
    } else {
      const newBooking = {...form, id:nextId, createdAt:new Date().toISOString()};
      setBookings(bs=>[...bs, newBooking]);
      setNextId(n=>n+1);
      showToast("Booking added!");
    }
    setShowForm(false);
  }

  function deleteBooking(id) {
    if(!confirm("Delete this booking?")) return;
    setBookings(bs=>bs.filter(b=>b.id!==id));
    showToast("Booking removed");
  }

  function unitsLabel(b){
    if(b.exclusive)return"🏝️ Exclusive Resort";
    if(b.units.length===1)return UNITS.find(u=>u.id===b.units[0])?.label;
    return b.units.map(uid=>UNITS.find(u=>u.id===uid)?.label).join(", ");
  }

  function generateReply(b){
    const at=ACCOM_TYPES[b.accomType];
    const nd=b.accomType==="overnight"?` (${formatDate(addDays(b.date,1))})`:"";
    const ul=b.exclusive?"🏝️ Exclusive Resort (all cottages & rooms)":`📍 ${unitsLabel(b)}`;
    const is22=getPairedId(b,bookings)!==null;
    return `Hi ${b.guestName}! 🌴 Thank you for choosing our resort!\n\n✅ Your booking is ${b.status.toUpperCase()}:${is22?"\n⏳ 22-Hour Package (Day Tour + Overnight)":""}\n${at.icon} ${at.label}\n${ul}\n📅 Date: ${formatDate(b.date)}\n⏰ Time In: ${at.timeIn}\n⏰ Time Out: ${at.timeOut}${nd}\n👥 ${b.pax} guest${b.pax!==1?"s":""}${b.address?`\n🏠 Address: ${b.address}`:""}${b.notes?`\n📝 Note: ${b.notes}`:""}\n\nWe look forward to welcoming you! If you have any questions, feel free to message us. 😊\n\n— The Resort Team`;
  }

  const filtered = useMemo(()=>bookings.filter(b=>{
    const ms=b.guestName.toLowerCase().includes(search.toLowerCase())||b.contact.toLowerCase().includes(search.toLowerCase());
    return ms&&(filterStatus==="all"||b.status===filterStatus)&&(filterType==="all"||b.accomType===filterType);
  }),[bookings,search,filterStatus,filterType]);

  const stats = useMemo(()=>({
    total:    bookings.filter(b=>b.status!=="cancelled").length,
    confirmed:bookings.filter(b=>b.status==="confirmed").length,
    pending:  bookings.filter(b=>b.status==="pending").length,
    pairs22:  bookings.filter(b=>b.accomType==="dayTour"&&b.status!=="cancelled"&&getPairedId(b,bookings)!==null).length,
  }),[bookings]);

  const calDays = Array.from({length:14},(_,i)=>addDays(today,i));
  const inp = { width:"100%", padding:"9px 12px", borderRadius:8, border:"1px solid rgba(255,255,255,0.15)", background:"rgba(255,255,255,0.08)", color:"#f0ede8", fontSize:14, outline:"none", boxSizing:"border-box" };
  const sel = {...inp, background:"#1a2f3a"};
  const lbl = { fontSize:12, color:"#a0bcc8", display:"block", marginBottom:5 };
  const Btn = ({onClick,style,children,disabled})=>(
    <button onClick={onClick} disabled={disabled} style={{ fontFamily:"Georgia,serif", cursor:disabled?"not-allowed":"pointer", opacity:disabled?.6:1, borderRadius:8, border:"none", ...style }}>{children}</button>
  );

  return (
    <div style={{ fontFamily:"Georgia,serif", minHeight:"100vh" }}>
      {toast && <div style={{ position:"fixed",top:24,right:24,zIndex:9999,background:toast.type==="error"?"#fee2e2":"#d1fae5",color:toast.type==="error"?"#991b1b":"#065f46",padding:"12px 20px",borderRadius:10,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",fontSize:13,maxWidth:360 }}>{toast.msg}</div>}

      {/* Header */}
      <div style={{ background:"rgba(255,255,255,0.05)",backdropFilter:"blur(10px)",borderBottom:"1px solid rgba(255,255,255,0.1)",padding:"20px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12 }}>
        <div>
          <div style={{ fontSize:22,fontWeight:700,letterSpacing:1,color:"#f9d77e" }}>🌴 Resort Booking Tracker</div>
          <div style={{ fontSize:12,color:"#a0bcc8",marginTop:2 }}>
            6 Cottages · 3 Rooms · ☀️ Day Tour &amp; 🌙 Overnight · 💾 Auto-saved to browser
          </div>
        </div>
        <div style={{ display:"flex",gap:10 }}>
          <Btn onClick={()=>exportCSV(bookings)} style={{ padding:"9px 16px",fontSize:13,background:"#34d399",color:"#1a1a1a",fontWeight:700,border:"none" }}>⬇️ Export CSV</Btn>
          <Btn onClick={openNew} style={{ padding:"10px 20px",fontSize:14,background:"#f9d77e",color:"#1a1a1a",fontWeight:700,border:"none" }}>+ New Booking</Btn>
        </div>
      </div>

      <div style={{ padding:"24px 32px" }}>

        {/* Stats */}
        <div style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20 }}>
          {[{label:"Active Bookings",value:stats.total,icon:"📋"},{label:"Confirmed",value:stats.confirmed,icon:"✅"},{label:"Pending",value:stats.pending,icon:"⏳"},{label:"22-Hr Packages",value:stats.pairs22,icon:"⏰"}].map(s=>(
            <div key={s.label} style={{ background:"rgba(255,255,255,0.08)",borderRadius:12,padding:"14px 16px",border:"1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ fontSize:20 }}>{s.icon}</div>
              <div style={{ fontSize:26,fontWeight:700,color:"#f9d77e",lineHeight:1.2 }}>{s.value}</div>
              <div style={{ fontSize:11,color:"#a0bcc8",marginTop:3 }}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Legend */}
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20 }}>
          {[{icon:"☀️",label:"Day Tour",time:"8:00 AM → 5:00 PM",color:"#fbbf24"},{icon:"🌙",label:"Overnight",time:"7:00 PM → 6:00 AM (next day)",color:"#818cf8"},{icon:"⏰",label:"22-Hr Package",time:"Day Tour + Overnight paired",color:"#34d399"}].map(at=>(
            <div key={at.label} style={{ background:"rgba(255,255,255,0.05)",borderRadius:10,padding:"10px 14px",border:`1px solid ${at.color}44` }}>
              <div style={{ fontSize:18 }}>{at.icon}</div>
              <div style={{ fontWeight:700,color:at.color,fontSize:13 }}>{at.label}</div>
              <div style={{ fontSize:11,color:"#a0bcc8" }}>{at.time}</div>
            </div>
          ))}
        </div>

        {/* Controls */}
        <div style={{ display:"flex",gap:10,marginBottom:20,alignItems:"center",flexWrap:"wrap" }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search guest or contact..." style={{ flex:1,minWidth:180,padding:"9px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"#f0ede8",fontSize:13,outline:"none" }}/>
          {["all","confirmed","pending","cancelled"].map(s=>(
            <Btn key={s} onClick={()=>setFilterStatus(s)} style={{ padding:"8px 13px",fontSize:12,fontWeight:600,background:filterStatus===s?"#f9d77e":"rgba(255,255,255,0.1)",color:filterStatus===s?"#1a1a1a":"#a0bcc8",border:"none" }}>
              {s.charAt(0).toUpperCase()+s.slice(1)}
            </Btn>
          ))}
          <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{ padding:"8px 13px",borderRadius:8,border:"1px solid rgba(255,255,255,0.2)",background:"#1a2f3a",color:"#f9d77e",fontSize:12,outline:"none",cursor:"pointer" }}>
            <option value="all">All Types</option>
            <option value="dayTour">☀️ Day Tour</option>
            <option value="overnight">🌙 Overnight</option>
          </select>
          <Btn onClick={()=>setView(v=>v==="list"?"calendar":"list")} style={{ padding:"8px 13px",fontSize:12,background:"transparent",color:"#f9d77e",border:"1px solid rgba(255,255,255,0.2)",fontWeight:400 }}>
            {view==="list"?"📅 Calendar":"📋 List"}
          </Btn>
        </div>

        {/* Calendar */}
        {view==="calendar" && (
          <div style={{ background:"rgba(255,255,255,0.05)",borderRadius:14,padding:20,border:"1px solid rgba(255,255,255,0.1)",overflowX:"auto",marginBottom:24 }}>
            <div style={{ fontSize:15,fontWeight:700,marginBottom:14,color:"#f9d77e" }}>14-Day Availability</div>
            <div style={{ display:"grid",gridTemplateColumns:`140px repeat(14,1fr)`,gap:2,minWidth:960 }}>
              <div/>
              {calDays.map(d=>(
                <div key={d} style={{ textAlign:"center",fontSize:10,color:d===today?"#f9d77e":"#a0bcc8",fontWeight:d===today?700:400,padding:"4px 2px" }}>
                  {new Date(d+"T00:00:00").toLocaleDateString("en",{month:"short",day:"numeric"})}
                </div>
              ))}
              {UNITS.map(unit=>(
                <React.Fragment key={unit.id}>
                  <div style={{ fontSize:11,color:"#f0ede8",padding:"6px 8px",fontWeight:600,display:"flex",alignItems:"center",gap:5 }}>
                    {unit.type==="cottage"?"🏡":"🛏"} {unit.label}
                  </div>
                  {calDays.map(d=>{
                    const dayB  =bookings.find(b=>b.status!=="cancelled"&&b.units.includes(unit.id)&&b.accomType==="dayTour"&&b.date===d);
                    const nightB=bookings.find(b=>b.status!=="cancelled"&&b.units.includes(unit.id)&&b.accomType==="overnight"&&b.date===d);
                    const nightP=bookings.find(b=>b.status!=="cancelled"&&b.units.includes(unit.id)&&b.accomType==="overnight"&&addDays(b.date,1)===d);
                    const is22D=dayB&&getPairedId(dayB,bookings)!==null;
                    const is22N=nightB&&getPairedId(nightB,bookings)!==null;
                    const nB=nightB||nightP;
                    return (
                      <div key={unit.id+d} style={{ height:26,borderRadius:4,border:"1px solid rgba(255,255,255,0.05)",display:"flex",overflow:"hidden",gap:1 }}>
                        <div title={dayB?`☀️ ${dayB.guestName}${is22D?" (22hr)":""}`:"Day: Available"} style={{ flex:1,background:dayB?(is22D?"#34d399":dayB.status==="confirmed"?"#fbbf24":"#fbbf2488"):"rgba(255,255,255,0.04)",cursor:dayB?"pointer":"default" }} onClick={()=>dayB&&openEdit(dayB)}/>
                        <div title={nB?`🌙 ${nB.guestName}${is22N?" (22hr)":""}`:"Night: Available"} style={{ flex:1,background:nB?(is22N?"#34d399":nB.status==="confirmed"?"#818cf8":"#818cf888"):"rgba(255,255,255,0.04)",cursor:nB?"pointer":"default" }} onClick={()=>nB&&openEdit(nB)}/>
                      </div>
                    );
                  })}
                </React.Fragment>
              ))}
            </div>
            <div style={{ marginTop:12,display:"flex",gap:14,flexWrap:"wrap",fontSize:11,color:"#a0bcc8" }}>
              {[["#fbbf24","☀️ Day Tour"],["#818cf8","🌙 Overnight"],["#34d399","⏰ 22-Hr Pair"]].map(([c,l])=>(
                <span key={l}><span style={{ display:"inline-block",width:12,height:12,background:c,borderRadius:2,marginRight:4 }}/>{l}</span>
              ))}
            </div>
          </div>
        )}

        {/* List */}
        {view==="list" && (
          <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
            {filtered.length===0 && <div style={{ textAlign:"center",padding:40,color:"#a0bcc8" }}>No bookings found.</div>}
            {[...filtered].sort((a,b)=>a.date.localeCompare(b.date)).map(b=>{
              const sc=STATUS_COLORS[b.status],at=ACCOM_TYPES[b.accomType];
              const is22=getPairedId(b,bookings)!==null;
              return (
                <div key={b.id} style={{ background:"rgba(255,255,255,0.07)",borderRadius:12,padding:"16px 20px",border:`1px solid ${is22?"#34d39944":at.color+"33"}`,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap" }}>
                  <div style={{ fontSize:28 }}>{b.exclusive?"🏝️":at.icon}</div>
                  <div style={{ flex:1,minWidth:200 }}>
                    <div style={{ display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3 }}>
                      <span style={{ fontWeight:700,fontSize:16,color:"#f0ede8" }}>{b.guestName}</span>
                      <span style={{ background:at.color+"33",color:at.color,borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700 }}>{at.icon} {at.label}</span>
                      {is22&&<span style={{ background:"#34d39922",color:"#34d399",borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700 }}>⏰ 22-Hr Package</span>}
                      {b.exclusive&&<span style={{ background:"#f9d77e22",color:"#f9d77e",borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700 }}>🏝️ Exclusive</span>}
                      {!b.exclusive&&b.units.length>1&&<span style={{ background:"rgba(255,255,255,0.1)",color:"#a0bcc8",borderRadius:10,padding:"2px 10px",fontSize:11 }}>{b.units.length} units</span>}
                    </div>
                    <div style={{ fontSize:13,color:"#a0bcc8" }}>{unitsLabel(b)} · {b.pax} guest{b.pax!==1?"s":""}</div>
                    <div style={{ fontSize:12,color:"#7ba3b0",marginTop:2 }}>📅 {formatDate(b.date)} · ⏰ {at.timeIn} → {at.timeOut}</div>
                    {b.contact&&<div style={{ fontSize:12,color:"#7ba3b0" }}>📱 {b.contact}</div>}
                    {b.address&&<div style={{ fontSize:12,color:"#7ba3b0" }}>🏠 {b.address}</div>}
                    {b.notes&&<div style={{ fontSize:12,color:"#7ba3b0",fontStyle:"italic" }}>"{b.notes}"</div>}
                  </div>
                  <div style={{ display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8 }}>
                    <span style={{ background:sc.bg,color:sc.text,borderRadius:20,padding:"3px 12px",fontSize:12,fontWeight:700 }}>
                      <span style={{ display:"inline-block",width:7,height:7,borderRadius:"50%",background:sc.dot,marginRight:5 }}/>
                      {b.status.charAt(0).toUpperCase()+b.status.slice(1)}
                    </span>
                    <div style={{ display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end" }}>
                      <Btn onClick={()=>{navigator.clipboard.writeText(generateReply(b));showToast("Messenger reply copied! 📋");}} style={{ padding:"6px 12px",fontSize:12,background:"#1877f2",color:"#fff",fontWeight:700,border:"none" }}>💬 Copy Reply</Btn>
                      {!is22&&<Btn onClick={()=>duplicateAsOther(b)} style={{ padding:"6px 12px",fontSize:12,background:"#34d39911",color:"#34d399",border:"1px solid #34d39966",fontWeight:700 }}>{b.accomType==="dayTour"?"➕🌙 Add Overnight":"➕☀️ Add Day Tour"}</Btn>}
                      <Btn onClick={()=>openEdit(b)} style={{ padding:"6px 12px",fontSize:12,background:"transparent",color:"#f0ede8",border:"1px solid rgba(255,255,255,0.2)",fontWeight:400 }}>Edit</Btn>
                      <Btn onClick={()=>deleteBooking(b.id)} style={{ padding:"6px 12px",fontSize:12,background:"transparent",color:"#ef4444",border:"1px solid rgba(239,68,68,0.3)",fontWeight:400 }}>✕</Btn>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Modal */}
      {showForm && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20 }}>
          <div style={{ background:"#1a2f3a",borderRadius:16,padding:28,width:"100%",maxWidth:520,border:"1px solid rgba(255,255,255,0.15)",maxHeight:"92vh",overflowY:"auto" }}>
            <div style={{ fontSize:18,fontWeight:700,marginBottom:20,color:"#f9d77e" }}>{editBooking?"Edit Booking":"New Booking"}</div>

            <div style={{ marginBottom:18 }}>
              <label style={lbl}>Accommodation Type *</label>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8 }}>
                {Object.entries(ACCOM_TYPES).map(([key,at])=>(
                  <button key={key} onClick={()=>setForm(f=>({...f,accomType:key}))} style={{ padding:"12px 8px",borderRadius:10,border:`2px solid ${form.accomType===key?at.color:"rgba(255,255,255,0.15)"}`,background:form.accomType===key?at.color+"22":"rgba(255,255,255,0.04)",color:form.accomType===key?at.color:"#a0bcc8",cursor:"pointer",fontWeight:700,fontSize:13,textAlign:"center" }}>
                    <div style={{ fontSize:22,marginBottom:3 }}>{at.icon}</div>
                    <div>{at.label}</div>
                    <div style={{ fontSize:10,fontWeight:400,marginTop:2,opacity:.85 }}>{at.timeIn} – {at.timeOut}</div>
                  </button>
                ))}
              </div>
            </div>

            {[{label:"Guest Name *",key:"guestName",placeholder:"Full name"},{label:"Messenger / Contact",key:"contact",placeholder:"FB name or phone"},{label:"Address",key:"address",placeholder:"Guest's home address"}].map(f=>(
              <div key={f.key} style={{ marginBottom:14 }}>
                <label style={lbl}>{f.label}</label>
                <input value={form[f.key]} placeholder={f.placeholder} onChange={e=>setForm(fm=>({...fm,[f.key]:e.target.value}))} style={inp}/>
              </div>
            ))}

            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14 }}>
              <div><label style={lbl}>Date *</label><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inp}/></div>
              <div><label style={lbl}>No. of Guests</label><input type="number" min={1} value={form.pax} onChange={e=>setForm(f=>({...f,pax:Number(e.target.value)}))} style={inp}/></div>
            </div>

            <div style={{ marginBottom:16 }}>
              <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8 }}>
                <label style={{ ...lbl,marginBottom:0 }}>Units * {!form.exclusive&&<span style={{ color:"#7ba3b0",fontWeight:400 }}>(select one or more)</span>}</label>
                <button onClick={toggleExclusive} style={{ padding:"5px 12px",borderRadius:8,border:`2px solid ${form.exclusive?"#f9d77e":"rgba(255,255,255,0.2)"}`,background:form.exclusive?"#f9d77e22":"transparent",color:form.exclusive?"#f9d77e":"#a0bcc8",cursor:"pointer",fontWeight:700,fontSize:11 }}>
                  🏝️ {form.exclusive?"Exclusive ✓":"Make Exclusive"}
                </button>
              </div>
              {form.exclusive
                ? <div style={{ background:"#f9d77e22",border:"2px solid #f9d77e55",borderRadius:10,padding:"12px 16px",color:"#f9d77e",fontWeight:700,fontSize:13,textAlign:"center" }}>🏝️ Entire Resort Reserved — All 6 Cottages &amp; 3 Rooms</div>
                : <>
                  <div style={{ marginBottom:6,fontSize:11,color:"#a0bcc8" }}>Cottages</div>
                  <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10 }}>
                    {UNITS.filter(u=>u.type==="cottage").map(u=>{ const s=form.units.includes(u.id); return <button key={u.id} onClick={()=>toggleUnit(u.id)} style={{ padding:"8px 6px",borderRadius:8,border:`2px solid ${s?"#34d399":"rgba(255,255,255,0.15)"}`,background:s?"#34d39922":"rgba(255,255,255,0.04)",color:s?"#34d399":"#a0bcc8",cursor:"pointer",fontWeight:600,fontSize:12 }}>🏡 {u.label}</button>; })}
                  </div>
                  <div style={{ marginBottom:6,fontSize:11,color:"#a0bcc8" }}>Rooms</div>
                  <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6 }}>
                    {UNITS.filter(u=>u.type==="room").map(u=>{ const s=form.units.includes(u.id); return <button key={u.id} onClick={()=>toggleUnit(u.id)} style={{ padding:"8px 6px",borderRadius:8,border:`2px solid ${s?"#34d399":"rgba(255,255,255,0.15)"}`,background:s?"#34d39922":"rgba(255,255,255,0.04)",color:s?"#34d399":"#a0bcc8",cursor:"pointer",fontWeight:600,fontSize:12 }}>🛏 {u.label}</button>; })}
                  </div>
                </>
              }
            </div>

            <div style={{ marginBottom:14 }}><label style={lbl}>Notes</label><input value={form.notes} placeholder="Special requests, etc." onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={inp}/></div>
            <div style={{ marginBottom:20 }}>
              <label style={lbl}>Status</label>
              <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={sel}>
                <option value="confirmed">Confirmed</option>
                <option value="pending">Pending</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div style={{ display:"flex",gap:10 }}>
              <Btn onClick={saveBooking} style={{ flex:1,padding:"11px",fontSize:15,background:"#f9d77e",color:"#1a1a1a",fontWeight:700,border:"none" }}>
                {editBooking?"Update":"Add Booking"}
              </Btn>
              <Btn onClick={()=>setShowForm(false)} style={{ padding:"11px 20px",fontSize:15,background:"transparent",color:"#f0ede8",border:"1px solid rgba(255,255,255,0.2)",fontWeight:400 }}>Cancel</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
